<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Desirèe & John – Save the Date</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Desirèe & John – Save the Date">
  <meta property="og:description" content="Guess what? We’re getting married! 💍💞 Take a look at our Save the Date ✨">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://john-and-desiree.github.io/save-the-date/eng/">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  
  <div class="progress-bar">
    <div class="segment"><div class="fill" id="seg1"></div></div>
    <div class="segment"><div class="fill" id="seg2"></div></div>
    <div class="segment"><div class="fill" id="seg3"></div></div>
  </div>

  <div class="slider">

    <section class="intro-slide active">
      <div class="intro-bg"></div>
      <div class="overlay">
        <h1 class="intro-text">Tap to begin our journey.</h1>
      </div>
    </section>

    <section class="slide">
      <img src="../images/foto1.jpg" alt="Photo 1" class="bg">
      <div class="overlay">
        <div class="content-box">
          <h1>Desirèe &amp; John<br>are getting married!</h1>
          <img src="../images/plane1.png" alt="Next" class="plane next-btn">
        </div>
      </div>
    </section>

    <section class="slide">
      <img src="../images/foto2.jpg" alt="Photo 2" class="bg">
      <div class="overlay">
        <div class="content-box">
          <h1>A journey<br>for a lifetime</h1>
          <img src="../images/plane2.png" alt="Next" class="plane next-btn">
        </div>
      </div>
    </section>

    <section class="slide last-slide">
      <img src="../images/foto3_no-moon.jpg" alt="Photo 3" class="bg">
      <div class="overlay">
        <div class="content-box">
          <img src="images/save-the-date-complete_ENG.png" alt="Save the Date" class="save-date">
        </div>
      </div>
    </section>

  </div>

  <script src="../script.js"></script>


  <!-- SoundCloud Hidden Player -->
  <iframe 
    id="sc-widget"
    width="1"
    height="1"
    style="opacity:0; position:absolute;"
    scrolling="no" 
    frameborder="no" 
    allow="autoplay"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/alexandra-violin/perfect-violin-cover&auto_play=false">
  </iframe>

  <!-- SoundCloud API + Autoplay on First Click -->
  <script src="https://w.soundcloud.com/player/api.js"></script>
  <script>
    const iframe = document.getElementById("sc-widget");
    const widget = SC.Widget(iframe);

    introSlide.addEventListener("click", () => {
      widget.play();
    });
  </script>


</body>
</html>
