<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Desirèe & John – Save the Date</title>

  <!-- Open Graph per WhatsApp / Social -->
  <meta property="og:title" content="Desirèe & John – Save the Date">
  <meta property="og:description" content="Spoiler: ci sposiamo! 💍💞 Scopri il nostro Save the Date ✨">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://john-and-desiree.github.io/save-the-date/">

  <!-- Google Font Parisienne -->
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
  <!-- Bootstrap Icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <!-- Preload immagini critiche -->
  <link rel="preload" as="image" href="images/foto1.jpg">
  <link rel="preload" as="image" href="images/foto2.jpg">
  <link rel="preload" as="image" href="images/foto3_no-moon.jpg">

  <!-- FONDAMENTALE PER MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
</head>

<body>
  
  <div class="progress-bar">
    <div class="segment"><div class="fill" id="seg1"></div></div>
    <div class="segment"><div class="fill" id="seg2"></div></div>
    <div class="segment"><div class="fill" id="seg3"></div></div>
  </div>

  <div class="slider">

    <!-- slide 0 -->
    <section class="intro-slide active">
      <div class="intro-bg"></div>
      <div class="overlay">
        <h1 class="intro-text">Clicca per iniziare il nostro viaggio</h1>
      </div>
    </section>
    
    <!-- slide 1 -->
    <section class="slide">
      <img src="images/foto1.jpg" alt="Foto 1" class="bg">
      <div class="overlay">
        <div class="content-box">
          <h1>Desirèe &amp; John<br>si sposano!</h1>
          <img src="images/plane1.png" alt="Next" class="plane next-btn">
        </div>
      </div>
    </section>

    <!-- slide 2 -->
    <section class="slide">
      <img src="images/foto2.jpg" alt="Foto 2" class="bg">
      <div class="overlay">
        <div class="content-box">
          <h1>Un viaggio lungo<br>una vita</h1>
          <img src="images/plane2.png" alt="Next" class="plane next-btn">
        </div>
      </div>
    </section>

    <!-- slide 3 -->
    <section class="slide last-slide">
      <img src="images/foto3_no-moon.jpg" alt="Foto 3" class="bg">
      <div class="overlay">
        <div class="content-box">
          <img src="images/save-the-date-complete.png" alt="Save the Date" class="save-date">
        </div>
      </div>
    </section>

  </div>

  <!-- Audio mp3 -->
  <audio id="bg-music" preload="auto" playsinline>
    <source src="audio/perfect-violin.mp3" type="audio/mpeg">
  </audio>

  <!-- Audio Toggle -->
  <button id="audio-toggle" class="audio-toggle" type="button" aria-label="Attiva/disattiva audio">
    <i id="audio-icon" class="bi bi-volume-up audio-icon" aria-hidden="true"></i>
  </button>

  <!-- JS -->
  <script src="script.js"></script>


</body>
</html>
