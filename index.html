  <!-- FONDAMENTALE PER MOBILE -->

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <meta name="apple-mobile-web-app-capable" content="yes">
</head>

<body>
  
  <div class="progress-bar">
    <div class="segment"><div class="fill" id="seg1"></div></div>
    <div class="segment"><div class="fill" id="seg2"></div></div>
    <div class="segment"><div class="fill" id="seg3"></div></div>
  </div>

  <div class="slider">

    <section class="intro-slide active">
      <div class="intro-bg"></div>
      <div class="overlay">
        <h1 class="intro-text">Clicca per iniziare il nostro viaggio</h1>
      </div>
    </section>
    
    <section class="slide">
      <img src="images/foto1.jpg" alt="Foto 1" class="bg">
      <div class="overlay">
        <div class="content-box">
          <h1>Desirèe &amp; John<br>si sposano!</h1>
          <img
            src="images/plane1.png"
            alt="Next"
            class="plane next-btn"
          >
        </div>
      </div>
    </section>

    <section class="slide">
      <img src="images/foto2.jpg" alt="Foto 2" class="bg">
      <div class="overlay">
        <div class="content-box">
          <h1>Un viaggio lungo<br>una vita</h1>
          <img
            src="images/plane2.png"
            alt="Next"
            class="plane next-btn"
          >
        </div>
      </div>
    </section>

    <section class="slide last-slide">
      <img src="images/foto3_no-moon.jpg" alt="Foto 3" class="bg">
      <div class="overlay">
        <div class="content-box">
          <img
            src="images/save-the-date-complete.png"
            alt="Save the Date"
            class="save-date"
          >
        </div>
      </div>
    </section>

  </div>

  <!-- JS -->
  <script src="script.js"></script>


  <!-- SoundCloud Hidden Player -->
  <iframe 
    id="sc-widget"
    width="1"
    height="1"
    style="position:absolute; opacity:0;"
    scrolling="no"
    frameborder="no"
    allow="autoplay"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/alexandra-violin/perfect-violin-cover&auto_play=false">
  </iframe>

  <!-- SoundCloud API + Autoplay on First Click -->
  <script src="https://w.soundcloud.com/player/api.js"></script>
  <script>
    const iframe = document.getElementById("sc-widget");
    const widget = SC.Widget(iframe);

    let audioStarted = false;

    introSlide.addEventListener("click", () => {

      if (!audioStarted) {
        widget.play();
        audioStarted = true;
      }

    });
  </script>


</body>
</html>
